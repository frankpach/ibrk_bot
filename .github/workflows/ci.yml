name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations (SQLite)
        env:
          DATABASE_URL: sqlite:///./ci_test.db
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          CONTROL_KEY: ci-test-key
          ADMIN_KEY: ci-test-admin-key
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            -n auto \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --timeout=60

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  live:
    name: Live tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.13-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-3.13-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations (PostgreSQL)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
        run: alembic upgrade head

      - name: Run live tests against PostgreSQL
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
          TEST_PG_URL: postgresql://ci:ci@localhost:5432/ci_test
          CONTROL_KEY: ci-test-key
          ADMIN_KEY: ci-test-admin-key
        run: |
          pytest tests/ \
            --tb=short \
            -q \
            -n auto \
            --timeout=60

  deploy:
    name: Deploy to aiutox-pi
    runs-on: ubuntu-latest
    needs: test
    environment: AIUTOX_PI_HOST
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AIUTOX_PI_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.AIUTOX_PI_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Add SSH host entry
        run: |
          cat >> ~/.ssh/config <<EOF
          Host aiutox-pi
            HostName aiutox-pi
            User frankpach
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking yes
          EOF

      - name: Deploy
        run: bash scripts/deploy.sh
