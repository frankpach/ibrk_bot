constraints:
  timeline: null
  technical:
    - "Sistema debe permanecer operativo en cada fase — no big-bang rewrites"
    - "Rollback definido para cada fase antes de ejecutar"
    - "Proceso único hoy — no cerrar puerta a workers separados"
    - "SQLite en producción hasta Fase 7"
    - "Acceso privado por Tailscale — sin exposición pública"
  business:
    - "Mínimo riesgo operacional en rutas de trading"
    - "Paper mode como red de seguridad durante fases críticas"

decisions:
  - id: D-01
    decision: "SQL plano + repositorios (no SQLAlchemy/SQLModel)"
    rationale: "Más legible, revisable y debuggeable para trading; repositorios proveen indirección suficiente"
  - id: D-02
    decision: "InProcessJobRunner con asyncio (no Celery/ARQ todavía)"
    rationale: "Proceso único hoy; interfaz swappable para workers futuros"
  - id: D-03
    decision: "X-Control-Key auth (no JWT/OAuth) para control plane inicial"
    rationale: "Tailscale reduce radio de exposición; JWT agrega complejidad sin ganancia proporcional"
  - id: D-04
    decision: "No DDD puro — use cases + ports + adapters es suficiente"
    rationale: "Pragmático; no hay Aggregates complejos en este dominio"

